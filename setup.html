<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StorageOS · Config Generator</title>
    <meta name="description" content="Visual configuration generator for disk_checker_config.json">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css?v=31">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Fira Sans', sans-serif;
            background: var(--bg-base, #0b0f1a);
            color: var(--text-primary, #e2e8f0);
            min-height: 100vh;
        }

        .cfg-page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px 80px;
        }

        /* Hero */
        .cfg-hero {
            display: flex; align-items: center; gap: 16px;
            margin-bottom: 36px;
        }
        .cfg-hero-icon {
            width: 46px; height: 46px; border-radius: 13px;
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 24px rgba(99,102,241,0.35);
        }
        .cfg-hero-text h1 {
            font-size: 1.4rem; font-weight: 700;
            background: linear-gradient(120deg, #e2e8f0 30%, #94a3b8);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .cfg-hero-text p { font-size: 0.8rem; color: var(--text-secondary, #64748b); margin-top: 3px; }

        .cfg-home-link {
            margin-left: auto;
            display: flex; align-items: center; gap: 7px;
            text-decoration: none; font-size: 0.78rem; font-weight: 500;
            color: var(--text-secondary, #64748b);
            padding: 7px 14px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            transition: all 0.15s;
        }
        .cfg-home-link:hover { color: #e2e8f0; border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); }

        /* Two-col layout */
        .cfg-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }
        @media (max-width: 720px) { .cfg-layout { grid-template-columns: 1fr; } }

        /* ── Left: Form panel ── */
        .cfg-form-panel {
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
        }
        .cfg-panel-head {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.02);
        }
        .cfg-panel-icon {
            width: 28px; height: 28px; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(14,165,233,0.18); color: #38bdf8; flex-shrink: 0;
        }
        .cfg-panel-title { font-size: 0.88rem; font-weight: 600; }
        .cfg-panel-file  { font-size: 0.68rem; color: var(--text-secondary, #64748b); font-family: 'JetBrains Mono', monospace; margin-left: auto; }
        .cfg-panel-body  { padding: 20px; }

        /* ── Right: Preview panel (sticky) ── */
        .cfg-preview-panel {
            position: sticky;
            top: 20px;
        }
        .cfg-preview-box {
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
        }
        .cfg-preview-head {
            padding: 10px 16px;
            font-size: 0.68rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--text-secondary); background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; gap: 8px;
        }
        .cfg-preview-head .dot { width: 8px; height: 8px; border-radius: 50%; }
        .cfg-preview-head .dot-red    { background: #f87171; }
        .cfg-preview-head .dot-amber  { background: #fbbf24; }
        .cfg-preview-head .dot-green  { background: #34d399; }
        .cfg-preview-pre {
            padding: 16px 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.73rem;
            line-height: 1.65;
            color: #94a3b8;
            overflow-x: auto;
            white-space: pre;
            max-height: 70vh;
            overflow-y: auto;
        }
        .cfg-preview-pre .key { color: #818cf8; }
        .cfg-preview-pre .str { color: #34d399; }
        .cfg-preview-pre .num { color: #fb923c; }

        
        /* Tabs */
        .cfg-tabs {
            display: flex; gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 8px;
        }
        .cfg-tab {
            padding: 10px 18px;
            font-size: 0.85rem; font-weight: 600;
            color: var(--text-secondary);
            background: transparent; border: none; cursor: pointer;
            border-radius: 8px; transition: all 0.15s;
        }
        .cfg-tab:hover { color: #e2e8f0; background: rgba(255,255,255,0.04); }
        .cfg-tab.active {
            color: #fff; background: rgba(14,165,233,0.15);
            box-shadow: 0 0 0 1px rgba(14,165,233,0.3);
        }

        .cfg-pane { display: none; }
        .cfg-pane.active { display: block; }
        
        /* Nesting */
        .cfg-nest-team {
            margin-left: 14px; margin-top: 8px; border-left: 2px solid rgba(255,255,255,0.1); padding-left: 12px;
        }
        .cfg-nest-disk {
            margin-left: 14px; margin-top: 8px; border-left: 2px solid rgba(14,165,233,0.3); padding-left: 12px;
        }

        /* Form elements */
        .field { margin-bottom: 14px; }
        .field label {
            display: block; font-size: 0.71rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--text-secondary, #64748b); margin-bottom: 5px;
        }
        .field input, .field select, .field textarea {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-primary, #e2e8f0);
            font-size: 0.82rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: #38bdf8;
            background: rgba(56,189,248,0.05);
        }
        .field input::placeholder, .field textarea::placeholder { color: rgba(148,163,184,0.45); }
        .field textarea { resize: vertical; line-height: 1.5; }
        .field select option {
            background: #1e2535;
            color: #e2e8f0;
        }

        /* Section headings */
        .cfg-section-label {
            font-size: 0.69rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--text-secondary, #64748b);
            margin: 18px 0 10px;
            display: flex; align-items: center; gap: 8px;
        }
        .cfg-section-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }

        /* Cards */
        .cfg-list { display: flex; flex-direction: column; gap: 8px; }
        .cfg-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            padding: 10px 12px;
        }
        .cfg-card-row { display: flex; gap: 8px; align-items: flex-end; }
        .cfg-card-row .field { margin-bottom: 0; flex: 1; }
        .cfg-card-num {
            width: 20px; height: 20px; border-radius: 50%;
            background: rgba(255,255,255,0.07);
            font-size: 0.63rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); flex-shrink: 0; align-self: center;
        }

        /* Validation messages */
        .cfg-error {
            margin-top: 6px; padding: 6px 10px;
            background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.25);
            border-radius: 7px; font-size: 0.72rem; color: #fb7185;
            display: flex; align-items: flex-start; gap: 6px; line-height: 1.4;
        }
        .cfg-warn {
            margin-top: 6px; padding: 6px 10px;
            background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25);
            border-radius: 7px; font-size: 0.72rem; color: #fbbf24;
            display: flex; align-items: flex-start; gap: 6px; line-height: 1.4;
        }
        .cfg-error svg, .cfg-warn svg { flex-shrink: 0; margin-top: 1px; }
        input.has-error, textarea.has-error {
            border-color: rgba(244,63,94,0.6) !important;
            background: rgba(244,63,94,0.05) !important;
        }
        input.has-warn, textarea.has-warn {
            border-color: rgba(251,191,36,0.5) !important;
            background: rgba(251,191,36,0.04) !important;
        }
        .btn-download:disabled {
            opacity: 0.45; cursor: not-allowed; transform: none !important;
            box-shadow: none;
        }
        .btn { cursor: pointer; font-family: inherit; border: none; border-radius: 8px; font-weight: 500; transition: all 0.15s; }
        .btn-danger {
            width: 28px; height: 28px; padding: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(244,63,94,0.1);
            border: 1px solid rgba(244,63,94,0.2);
            color: #fb7185; border-radius: 7px; flex-shrink: 0;
        }
        .btn-danger:hover { background: rgba(244,63,94,0.2); }

        .btn-add-row {
            width: 100%; padding: 8px;
            font-size: 0.77rem;
            background: rgba(255,255,255,0.025);
            border: 1px dashed rgba(255,255,255,0.11);
            color: var(--text-secondary, #64748b);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-add-row:hover { border-color: #38bdf8; color: #38bdf8; background: rgba(56,189,248,0.04); }

        .btn-download {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 11px 20px;
            font-size: 0.84rem; font-weight: 600;
            border-radius: 10px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: #fff; border: none; margin-top: 14px; cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            box-shadow: 0 4px 16px rgba(99,102,241,0.3);
        }
        .btn-download:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn-download:active { transform: translateY(0); }

        /* Toast */
        .cfg-toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3);
            color: #6ee7b7; padding: 10px 20px; border-radius: 10px;
            font-size: 0.8rem; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0; z-index: 99999;
        }
        .cfg-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>

<body>
<div class="cfg-page">

    <!-- Hero -->
    <div class="cfg-hero">
        <div class="cfg-hero-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
            </svg>
        </div>
        <div class="cfg-hero-text">
            <h1>Config Generator</h1>
            <p>Generate <code>disk_checker_config.json</code> — fill in the form and download.</p>
        </div>
        <a href="index.html" class="cfg-home-link">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Back to Dashboard
        </a>
    </div>

    
    <!-- Tabs -->
    <div class="cfg-tabs">
        <button class="cfg-tab active" data-tab="dc">Scanner Config (disk_checker_config.json)</button>
        <button class="cfg-tab" data-tab="dj">Dashboard Config (disks.json)</button>
    </div>

    <!-- Layout: form left, preview right -->

    <div class="cfg-layout">

        <!-- LEFT: Config Form -->
        <div class="cfg-form-panel">
            <div class="cfg-panel-head">
                <div class="cfg-panel-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                </div>
                <span class="cfg-panel-title" id="dyn-title">Scanner Configuration</span>
                <span class="cfg-panel-file" id="dyn-file">disk_checker_config.json</span>
            </div>
            <div class="cfg-panel-body">
            <div class="cfg-pane active" id="pane-dc">

                <div class="field">
                    <label>Scan Directory</label>
                    <input type="text" id="dc-directory" placeholder="/mnt/data" value="/www/wwwroot">
                </div>

                <!-- Teams -->
                <div class="cfg-section-label">Teams</div>
                <div class="cfg-list" id="dc-teams-list"></div>
                <button class="btn btn-add-row" id="dc-add-team" style="margin-top:8px">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Team
                </button>

                <!-- Users -->
                <div class="cfg-section-label" style="margin-top:20px">Users</div>
                <div class="cfg-list" id="dc-users-list"></div>
                <button class="btn btn-add-row" id="dc-add-user-group" style="margin-top:8px">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add User Group
                </button>

            </div><!-- /pane-dc -->

            <div class="cfg-pane" id="pane-dj">
                <div class="cfg-section-label">Teams</div>
                <div class="cfg-list" id="dj-teams-list"></div>
                <button class="btn btn-add-row" id="dj-add-team" style="margin-top:16px;">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Team
                </button>
            </div><!-- /pane-dj -->

            </div><!-- /cfg-panel-body -->
        </div><!-- /cfg-form-panel -->

        <!-- RIGHT: Preview + Download (sticky) -->
        <div class="cfg-preview-panel">
            <div class="cfg-preview-box">
                <div class="cfg-preview-head">
                    <span class="dot dot-red"></span>
                    <span class="dot dot-amber"></span>
                    <span class="dot dot-green"></span>
                    <span style="margin-left:6px" id="dyn-preview-file">disk_checker_config.json</span>
                </div>
                <pre class="cfg-preview-pre" id="dc-preview"></pre>
            </div>
            <button class="btn btn-download" id="dc-download">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download <span id="dyn-dl-name">disk_checker_config.json</span>
            </button>
        </div>

    </div>

</div>

<!-- Toast -->
<div class="cfg-toast" id="cfg-toast">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="cfg-toast-msg">Downloaded!</span>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let dcTeams = [{ name: 'Ops', id: 1 }];
// Each group: { text: string, teamId: number }
let dcUserGroups = [{ text: 'root\nwww', teamId: 1 }];

// ─── Helpers ──────────────────────────────────────────────────────────────────
function escAttr(s) { return String(s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function toast(msg) {
    const el = document.getElementById('cfg-toast');
    document.getElementById('cfg-toast-msg').textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
}

function download(filename, content) {
    const a = document.createElement('a');
    a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(content);
    a.download = filename;
    a.click();
}

// ─── Preview renderer ─────────────────────────────────────────────────────────
function dcHighlightCompact(obj) {
    const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const kv  = (k, v) => `<span class="key">"${esc(k)}"</span>: <span class="str">"${esc(v)}"</span>`;
    const kvn = (k, v) => `<span class="key">"${esc(k)}"</span>: <span class="num">${v}</span>`;

    const teamLines = obj.teams.length
        ? obj.teams.map(t => '    { ' + kv('name', t.name) + ', ' + kvn('team_id', t.team_id) + ' }').join(',\n')
        : '    ';
    const userLines = obj.users.length
        ? obj.users.map(u => '    { ' + kv('name', u.name) + ', ' + kvn('team_id', u.team_id) + ' }').join(',\n')
        : '    ';

    return [
        '{',
        '  ' + kv('directory',   obj.directory) + ',',
        '  ' + kv('output_file', obj.output_file) + ',',
        '  <span class="key">"teams"</span>: [',
        teamLines,
        '  ],',
        '  <span class="key">"users"</span>: [',
        userLines,
        '  ]',
        '}',
    ].join('\n');
}

function dcBuild() {
    const users = [];
    dcUserGroups.forEach(g => {
        const teamId = g.teamId || (dcTeams[0]?.id ?? 1);
        g.text.split('\n').map(s => s.trim()).filter(Boolean)
              .forEach(n => users.push({ name: n, team_id: teamId }));
    });
    return {
        directory:   document.getElementById('dc-directory').value.trim() || '/mnt/data',
        output_file: 'disk_usage_report.json',
        teams: dcTeams.map(t => ({ name: t.name, team_id: t.id })),
        users,
    };
}

function dcRenderPreview() {
    if (activeTab === 'dc') {
        document.getElementById('dc-preview').innerHTML = dcHighlightCompact(dcBuild());
    }
    dcValidate();
}

// ─── Validation ───────────────────────────────────────────────────────────────────
const ERR_SVG = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
const WARN_SVG = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;

function dcValidate() {
    let hasError = false;

    // 1. Check team names for reserved word "other"
    const teamInputs = document.querySelectorAll('.dc-team-name');
    document.querySelectorAll('.dc-team-name-err').forEach(el => el.remove());
    teamInputs.forEach((el, i) => {
        el.classList.remove('has-error');
        if (el.value.trim().toLowerCase() === 'other') {
            el.classList.add('has-error');
            const msg = document.createElement('div');
            msg.className = 'cfg-error dc-team-name-err';
            msg.innerHTML = ERR_SVG + ' "other" is a reserved name used internally. Please choose a different team name.';
            el.closest('.field').appendChild(msg);
            hasError = true;
        }
    });

    // 2. Check duplicate usernames across all groups
    const allNames = [];
    dcUserGroups.forEach(g => {
        g.text.split('\n').map(s => s.trim()).filter(Boolean).forEach(n => allNames.push(n.toLowerCase()));
    });
    const seen = new Set();
    const dupes = new Set();
    allNames.forEach(n => { if (seen.has(n)) dupes.add(n); else seen.add(n); });

    const textareas = document.querySelectorAll('.dc-ug-text');
    document.querySelectorAll('.dc-ug-warn').forEach(el => el.remove());
    textareas.forEach((el) => {
        el.classList.remove('has-warn');
        const names = el.value.split('\n').map(s => s.trim()).filter(Boolean);
        const myDupes = names.filter(n => dupes.has(n.toLowerCase()));
        if (myDupes.length) {
            el.classList.add('has-warn');
            const msg = document.createElement('div');
            msg.className = 'cfg-warn dc-ug-warn';
            msg.innerHTML = WARN_SVG + ` Duplicate username(s): <strong>${myDupes.join(', ')}</strong>`;
            el.closest('.field').appendChild(msg);
            // not a hard error — just a warning, don't block download
        }
    });

    // Block download if hard errors exist
    if (activeTab === 'dc') {
        const btn = document.getElementById('dc-download');
        btn.disabled = hasError;
    }
}

// ─── Teams ────────────────────────────────────────────────────────────────────
function dcRenderTeams() {
    const list = document.getElementById('dc-teams-list');
    list.innerHTML = dcTeams.map((t, i) => `
    <div class="cfg-card">
        <div class="cfg-card-row">
            <span class="cfg-card-num">${i + 1}</span>
            <div class="field">
                <label>Team Name</label>
                <input class="dc-team-name" type="text" value="${escAttr(t.name)}" placeholder="Engineering">
            </div>
            <div class="field" style="max-width:80px">
                <label>ID</label>
                <input class="dc-team-id" type="number" min="1" value="${t.id}">
            </div>
            <button class="btn btn-danger dc-rm-team">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
    </div>`).join('');

    list.querySelectorAll('.dc-team-name').forEach((el, i) => el.addEventListener('input', () => {
        dcTeams[i].name = el.value;
        dcRefreshUserTeamSelect();
        dcRenderPreview();
    }));
    list.querySelectorAll('.dc-team-id').forEach((el, i) => el.addEventListener('input', () => {
        dcTeams[i].id = parseInt(el.value) || i + 1;
        dcRefreshUserTeamSelect();
        dcRenderPreview();
    }));
    list.querySelectorAll('.dc-rm-team').forEach((el, i) => el.addEventListener('click', () => {
        dcTeams.splice(i, 1);
        dcRenderTeams();
        dcRefreshUserTeamSelect();
        dcRenderPreview();
    }));
}

function dcRefreshUserTeamSelect() {
    // update all group selects to reflect current teams
    document.querySelectorAll('.dc-ug-team').forEach((sel, i) => {
        const cur = dcUserGroups[i]?.teamId;
        sel.innerHTML = dcTeams.map(t =>
            `<option value="${t.id}">${escAttr(t.name)} (ID ${t.id})</option>`
        ).join('');
        if (cur) sel.value = cur;
    });
}

// ─── User Groups ─────────────────────────────────────────────────────────────
function dcRenderUserGroups() {
    const list = document.getElementById('dc-users-list');
    const teamOpts = dcTeams.map(t =>
        `<option value="${t.id}">${escAttr(t.name)} (ID ${t.id})</option>`
    ).join('');

    list.innerHTML = dcUserGroups.map((g, i) => `
    <div class="cfg-card">
        <div class="cfg-card-row" style="align-items:flex-start;gap:10px">
            <div class="field" style="flex:1;margin-bottom:0">
                <label>Usernames <span style="opacity:.5;font-weight:400;text-transform:none">(one per line)</span></label>
                <textarea class="dc-ug-text" rows="4" placeholder="alice&#10;bob">${escAttr(g.text)}</textarea>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;flex:0 0 140px">
                <div class="field" style="margin-bottom:0">
                    <label>Assign Team</label>
                    <select class="dc-ug-team" style="width:100%">${teamOpts}</select>
                </div>
                ${dcUserGroups.length > 1 ? `
                <button class="btn btn-danger dc-ug-rm" style="width:100%;border-radius:8px;height:30px">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    <span style="font-size:0.72rem">Remove</span>
                </button>` : ''}
            </div>
        </div>
    </div>`).join('');

    // wire events
    list.querySelectorAll('.dc-ug-text').forEach((el, i) => {
        el.value = dcUserGroups[i].text;  // restore real value (escAttr was for HTML attr only)
        el.addEventListener('input', () => { dcUserGroups[i].text = el.value; dcRenderPreview(); });
    });
    list.querySelectorAll('.dc-ug-team').forEach((el, i) => {
        el.value = dcUserGroups[i].teamId;
        el.addEventListener('change', () => { dcUserGroups[i].teamId = parseInt(el.value); dcRenderPreview(); });
    });
    list.querySelectorAll('.dc-ug-rm').forEach((el, i) => {
        el.addEventListener('click', () => {
            dcUserGroups.splice(i, 1);
            dcRenderUserGroups();
            dcRenderPreview();
        });
    });
}

// ─── Events ───────────────────────────────────────────────────────────────────
document.getElementById('dc-add-team').addEventListener('click', () => {
    const nextId = dcTeams.length ? Math.max(...dcTeams.map(t => t.id)) + 1 : 1;
    dcTeams.push({ name: 'New Team', id: nextId });
    dcRenderTeams();
    dcRefreshUserTeamSelect();
    dcRenderPreview();
});

document.getElementById('dc-add-user-group').addEventListener('click', () => {
    const defaultTeam = dcTeams[0]?.id ?? 1;
    dcUserGroups.push({ text: '', teamId: defaultTeam });
    dcRenderUserGroups();
    dcRenderPreview();
});

document.getElementById('dc-directory').addEventListener('input', dcRenderPreview);




// ─── TABS ─────────────────────────────────────────────────────────────────────
let activeTab = 'dc'; // 'dc' or 'dj'
document.querySelectorAll('.cfg-tab').forEach(tab => {
    tab.addEventListener('click', (e) => {
        document.querySelectorAll('.cfg-tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        activeTab = e.target.getAttribute('data-tab');
        
        document.querySelectorAll('.cfg-pane').forEach(p => p.classList.remove('active'));
        document.getElementById('pane-' + activeTab).classList.add('active');
        
        if (activeTab === 'dc') {
            document.getElementById('dyn-title').textContent = 'Scanner Configuration';
            document.getElementById('dyn-file').textContent = 'disk_checker_config.json';
            document.getElementById('dyn-preview-file').textContent = 'disk_checker_config.json';
            document.getElementById('dyn-dl-name').textContent = 'disk_checker_config.json';
            dcRenderPreview();
        } else {
            document.getElementById('dyn-title').textContent = 'Dashboard Configuration';
            document.getElementById('dyn-file').textContent = 'disks.json';
            document.getElementById('dyn-preview-file').textContent = 'disks.json';
            document.getElementById('dyn-dl-name').textContent = 'disks.json';
            djRenderPreview();
        }
    });
});

// ─── DASHBOARD CONFIG (disks.json) ────────────────────────────────────────────
let djTeams = [
    {
        name: 'Backend Team',
        disks: [
            { id: 'disk_test', name: 'Primary Storage', path: 'reports_test' }
        ]
    }
];

function colorizeJSON(jsonString) {
    return jsonString.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
        let cls = 'num';
        if (/^"/.test(match)) {
            if (/:$/.test(match)) {
                cls = 'key';
                // remove quotes from key for prettier look if wanted, but json requires quotes
            } else {
                cls = 'str';
            }
        }
        return '<span class="' + cls + '">' + match + '</span>';
    });
}


function compressDisksJSON(jsonStr) {
    return jsonStr.replace(/\{\n\s*"id":\s*("[^"]*"),\n\s*"name":\s*("[^"]*"),\n\s*"path":\s*("[^"]*")\n\s*\}/g, '{ "id": $1, "name": $2, "path": $3 }');
}

function djRenderPreview() {
    // Basic validation
    let hasError = false;
    document.querySelectorAll('.dj-input-required').forEach(el => {
        el.classList.remove('has-error');
        if (!el.value.trim()) {
            el.classList.add('has-error');
            hasError = true;
        }
    });
    
    if (activeTab === 'dj') {
        document.getElementById('dc-download').disabled = hasError;
        let rawJSON = JSON.stringify(djTeams, null, 2);
        rawJSON = compressDisksJSON(rawJSON);
        rawJSON = rawJSON.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        document.getElementById('dc-preview').innerHTML = colorizeJSON(rawJSON);
    }
}

function djRender() {
    const list = document.getElementById('dj-teams-list');
    list.innerHTML = djTeams.map((t, tIdx) => {
        return `
        <div class="cfg-card" style="margin-bottom: 12px; border-color: rgba(14,165,233,0.3);">
            <div class="cfg-card-row">
                <div class="field">
                    <label>Team Name</label>
                    <input class="dj-input-required" type="text" value="${escAttr(t.name)}" placeholder="e.g. Backend Team" oninput="djUpdate('t', ${tIdx}, null, 'name', this.value)">
                </div>
                <button class="btn btn-danger" onclick="djRemove('t', ${tIdx})" title="Remove Team">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="cfg-nest-disk">
                ${t.disks.map((d, dIdx) => `
                    <div class="cfg-card-row" style="margin-bottom: 6px">
                        <div class="field"><label>Disk ID</label><input class="dj-input-required" type="text" value="${escAttr(d.id)}" placeholder="disk_1" oninput="djUpdate('d', ${tIdx}, ${dIdx}, 'id', this.value)"></div>
                        <div class="field"><label>Disk Name</label><input class="dj-input-required" type="text" value="${escAttr(d.name)}" placeholder="Primary Storage" oninput="djUpdate('d', ${tIdx}, ${dIdx}, 'name', this.value)"></div>
                        <div class="field"><label>Server Path</label><input class="dj-input-required" type="text" value="${escAttr(d.path)}" placeholder="/www/wwwroot" oninput="djUpdate('d', ${tIdx}, ${dIdx}, 'path', this.value)"></div>
                        <button class="btn btn-danger" onclick="djRemove('d', ${tIdx}, ${dIdx})" title="Remove Disk" style="margin-bottoM:14px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                    </div>
                `).join('')}
                <button class="btn btn-add-row" onclick="djAdd('d', ${tIdx})" style="padding: 4px; font-size: 0.7rem">+ Add Disk</button>
            </div>
        </div>`;
    }).join('');
    
    djRenderPreview();
}

window.djUpdate = function(type, tIdx, dIdx, key, val) {
    if (type === 't') djTeams[tIdx][key] = val;
    else if (type === 'd') djTeams[tIdx].disks[dIdx][key] = val;
    djRenderPreview();
};

window.djRemove = function(type, tIdx, dIdx) {
    if (type === 't') djTeams.splice(tIdx, 1);
    else if (type === 'd') djTeams[tIdx].disks.splice(dIdx, 1);
    djRender();
};

window.djAdd = function(type, tIdx) {
    if (type === 't') {
        djTeams.push({ name: 'New Team', disks: [] });
    } else if (type === 'd') {
        djTeams[tIdx].disks.push({ id: 'disk_' + Math.floor(Math.random()*1000), name: 'Disk Storage', path: '/reports' });
    }
    djRender();
};

document.getElementById('dj-add-team').addEventListener('click', () => djAdd('t'));

// Update download button
document.getElementById('dc-download').addEventListener('click', () => {
    if (activeTab === 'dc') {
        download('disk_checker_config.json', JSON.stringify(dcBuild(), null, 2));
        toast('Downloaded disk_checker_config.json');
    } else {
        const outJSON = compressDisksJSON(JSON.stringify(djTeams, null, 2));
        download('disks.json', outJSON);
        toast('Downloaded disks.json');
    }
});


// ─── Init ─────────────────────────────────────────────────────────────────────
dcRenderTeams();
dcRefreshUserTeamSelect();
dcRenderUserGroups();
dcRenderPreview();
    djRender();
</script>
