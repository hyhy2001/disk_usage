<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StorageOS · Config Generator</title>
    <meta name="description" content="Visual configuration generator for disk_checker_config.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css?v=31">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base, #0b0f1a);
            color: var(--text-primary, #e2e8f0);
            min-height: 100vh;
        }

        .cfg-page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px 80px;
        }

        /* Hero */
        .cfg-hero {
            display: flex; align-items: center; gap: 16px;
            margin-bottom: 36px;
        }
        .cfg-hero-icon {
            width: 46px; height: 46px; border-radius: 13px;
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 24px rgba(99,102,241,0.35);
        }
        .cfg-hero-text h1 {
            font-size: 1.4rem; font-weight: 700;
            background: linear-gradient(120deg, #e2e8f0 30%, #94a3b8);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .cfg-hero-text p { font-size: 0.8rem; color: var(--text-secondary, #64748b); margin-top: 3px; }

        .cfg-home-link {
            margin-left: auto;
            display: flex; align-items: center; gap: 7px;
            text-decoration: none; font-size: 0.78rem; font-weight: 500;
            color: var(--text-secondary, #64748b);
            padding: 7px 14px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            transition: all 0.15s;
        }
        .cfg-home-link:hover { color: #e2e8f0; border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); }

        /* Two-col layout */
        .cfg-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }
        @media (max-width: 720px) { .cfg-layout { grid-template-columns: 1fr; } }

        /* ── Left: Form panel ── */
        .cfg-form-panel {
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
        }
        .cfg-panel-head {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.02);
        }
        .cfg-panel-icon {
            width: 28px; height: 28px; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(14,165,233,0.18); color: #38bdf8; flex-shrink: 0;
        }
        .cfg-panel-title { font-size: 0.88rem; font-weight: 600; }
        .cfg-panel-file  { font-size: 0.68rem; color: var(--text-secondary, #64748b); font-family: 'JetBrains Mono', monospace; margin-left: auto; }
        .cfg-panel-body  { padding: 20px; }

        /* ── Right: Preview panel (sticky) ── */
        .cfg-preview-panel {
            position: sticky;
            top: 20px;
        }
        .cfg-preview-box {
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
        }
        .cfg-preview-head {
            padding: 10px 16px;
            font-size: 0.68rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--text-secondary); background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; gap: 8px;
        }
        .cfg-preview-head .dot { width: 8px; height: 8px; border-radius: 50%; }
        .cfg-preview-head .dot-red    { background: #f87171; }
        .cfg-preview-head .dot-amber  { background: #fbbf24; }
        .cfg-preview-head .dot-green  { background: #34d399; }
        .cfg-preview-pre {
            padding: 16px 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.73rem;
            line-height: 1.65;
            color: #94a3b8;
            overflow-x: auto;
            white-space: pre;
            max-height: 70vh;
            overflow-y: auto;
        }
        .cfg-preview-pre .key { color: #818cf8; }
        .cfg-preview-pre .str { color: #34d399; }
        .cfg-preview-pre .num { color: #fb923c; }

        /* Form elements */
        .field { margin-bottom: 14px; }
        .field label {
            display: block; font-size: 0.71rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--text-secondary, #64748b); margin-bottom: 5px;
        }
        .field input, .field select, .field textarea {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-primary, #e2e8f0);
            font-size: 0.82rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: #38bdf8;
            background: rgba(56,189,248,0.05);
        }
        .field input::placeholder, .field textarea::placeholder { color: rgba(148,163,184,0.45); }
        .field textarea { resize: vertical; line-height: 1.5; }

        /* Section headings */
        .cfg-section-label {
            font-size: 0.69rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--text-secondary, #64748b);
            margin: 18px 0 10px;
            display: flex; align-items: center; gap: 8px;
        }
        .cfg-section-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }

        /* Cards */
        .cfg-list { display: flex; flex-direction: column; gap: 8px; }
        .cfg-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            padding: 10px 12px;
        }
        .cfg-card-row { display: flex; gap: 8px; align-items: flex-end; }
        .cfg-card-row .field { margin-bottom: 0; flex: 1; }
        .cfg-card-num {
            width: 20px; height: 20px; border-radius: 50%;
            background: rgba(255,255,255,0.07);
            font-size: 0.63rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); flex-shrink: 0; align-self: center;
        }

        /* Buttons */
        .btn { cursor: pointer; font-family: inherit; border: none; border-radius: 8px; font-weight: 500; transition: all 0.15s; }
        .btn-danger {
            width: 28px; height: 28px; padding: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(244,63,94,0.1);
            border: 1px solid rgba(244,63,94,0.2);
            color: #fb7185; border-radius: 7px; flex-shrink: 0;
        }
        .btn-danger:hover { background: rgba(244,63,94,0.2); }

        .btn-add-row {
            width: 100%; padding: 8px;
            font-size: 0.77rem;
            background: rgba(255,255,255,0.025);
            border: 1px dashed rgba(255,255,255,0.11);
            color: var(--text-secondary, #64748b);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-add-row:hover { border-color: #38bdf8; color: #38bdf8; background: rgba(56,189,248,0.04); }

        .btn-download {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 11px 20px;
            font-size: 0.84rem; font-weight: 600;
            border-radius: 10px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: #fff; border: none; margin-top: 14px; cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            box-shadow: 0 4px 16px rgba(99,102,241,0.3);
        }
        .btn-download:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn-download:active { transform: translateY(0); }

        /* Toast */
        .cfg-toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3);
            color: #6ee7b7; padding: 10px 20px; border-radius: 10px;
            font-size: 0.8rem; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0; z-index: 99999;
        }
        .cfg-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>

<body>
<div class="cfg-page">

    <!-- Hero -->
    <div class="cfg-hero">
        <div class="cfg-hero-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
            </svg>
        </div>
        <div class="cfg-hero-text">
            <h1>Config Generator</h1>
            <p>Generate <code>disk_checker_config.json</code> — fill in the form and download.</p>
        </div>
        <a href="index.html" class="cfg-home-link">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Back to Dashboard
        </a>
    </div>

    <!-- Layout: form left, preview right -->
    <div class="cfg-layout">

        <!-- LEFT: Config Form -->
        <div class="cfg-form-panel">
            <div class="cfg-panel-head">
                <div class="cfg-panel-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                </div>
                <span class="cfg-panel-title">Scanner Configuration</span>
                <span class="cfg-panel-file">disk_checker_config.json</span>
            </div>
            <div class="cfg-panel-body">

                <div class="field">
                    <label>Scan Directory</label>
                    <input type="text" id="dc-directory" placeholder="/mnt/data" value="/www/wwwroot">
                </div>

                <!-- Teams -->
                <div class="cfg-section-label">Teams</div>
                <div class="cfg-list" id="dc-teams-list"></div>
                <button class="btn btn-add-row" id="dc-add-team" style="margin-top:8px">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Team
                </button>

                <!-- Users -->
                <div class="cfg-section-label" style="margin-top:20px">Users</div>
                <div class="cfg-list" id="dc-users-list"></div>
                <button class="btn btn-add-row" id="dc-add-user-group" style="margin-top:8px">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add User Group
                </button>

            </div>
        </div>

        <!-- RIGHT: Preview + Download (sticky) -->
        <div class="cfg-preview-panel">
            <div class="cfg-preview-box">
                <div class="cfg-preview-head">
                    <span class="dot dot-red"></span>
                    <span class="dot dot-amber"></span>
                    <span class="dot dot-green"></span>
                    <span style="margin-left:6px">disk_checker_config.json</span>
                </div>
                <pre class="cfg-preview-pre" id="dc-preview"></pre>
            </div>
            <button class="btn btn-download" id="dc-download">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download disk_checker_config.json
            </button>
        </div>

    </div>

</div>

<!-- Toast -->
<div class="cfg-toast" id="cfg-toast">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="cfg-toast-msg">Downloaded!</span>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let dcTeams = [{ name: 'Ops', id: 1 }];
// Each group: { text: string, teamId: number }
let dcUserGroups = [{ text: 'root\nwww', teamId: 1 }];

// ─── Helpers ──────────────────────────────────────────────────────────────────
function escAttr(s) { return String(s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function toast(msg) {
    const el = document.getElementById('cfg-toast');
    document.getElementById('cfg-toast-msg').textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
}

function download(filename, content) {
    const a = document.createElement('a');
    a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(content);
    a.download = filename;
    a.click();
}

// ─── Preview renderer ─────────────────────────────────────────────────────────
function dcHighlightCompact(obj) {
    const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const kv  = (k, v) => `<span class="key">"${esc(k)}"</span>: <span class="str">"${esc(v)}"</span>`;
    const kvn = (k, v) => `<span class="key">"${esc(k)}"</span>: <span class="num">${v}</span>`;

    const teamLines = obj.teams.length
        ? obj.teams.map(t => '    { ' + kv('name', t.name) + ', ' + kvn('team_ID', t.team_ID) + ' }').join(',\n')
        : '    ';
    const userLines = obj.users.length
        ? obj.users.map(u => '    { ' + kv('name', u.name) + ', ' + kvn('team_ID', u.team_ID) + ' }').join(',\n')
        : '    ';

    return [
        '{',
        '  ' + kv('directory',   obj.directory) + ',',
        '  ' + kv('output_file', obj.output_file) + ',',
        '  <span class="key">"teams"</span>: [',
        teamLines,
        '  ],',
        '  <span class="key">"users"</span>: [',
        userLines,
        '  ]',
        '}',
    ].join('\n');
}

function dcBuild() {
    const users = [];
    dcUserGroups.forEach(g => {
        const teamId = g.teamId || (dcTeams[0]?.id ?? 1);
        g.text.split('\n').map(s => s.trim()).filter(Boolean)
              .forEach(n => users.push({ name: n, team_ID: teamId }));
    });
    return {
        directory:   document.getElementById('dc-directory').value.trim() || '/mnt/data',
        output_file: 'disk_usage_report.json',
        teams: dcTeams.map(t => ({ name: t.name, team_ID: t.id })),
        users,
    };
}

function dcRenderPreview() {
    document.getElementById('dc-preview').innerHTML = dcHighlightCompact(dcBuild());
}

// ─── Teams ────────────────────────────────────────────────────────────────────
function dcRenderTeams() {
    const list = document.getElementById('dc-teams-list');
    list.innerHTML = dcTeams.map((t, i) => `
    <div class="cfg-card">
        <div class="cfg-card-row">
            <span class="cfg-card-num">${i + 1}</span>
            <div class="field">
                <label>Team Name</label>
                <input class="dc-team-name" type="text" value="${escAttr(t.name)}" placeholder="Engineering">
            </div>
            <div class="field" style="max-width:80px">
                <label>ID</label>
                <input class="dc-team-id" type="number" min="1" value="${t.id}">
            </div>
            <button class="btn btn-danger dc-rm-team">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
    </div>`).join('');

    list.querySelectorAll('.dc-team-name').forEach((el, i) => el.addEventListener('input', () => {
        dcTeams[i].name = el.value;
        dcRefreshUserTeamSelect();
        dcRenderPreview();
    }));
    list.querySelectorAll('.dc-team-id').forEach((el, i) => el.addEventListener('input', () => {
        dcTeams[i].id = parseInt(el.value) || i + 1;
        dcRefreshUserTeamSelect();
        dcRenderPreview();
    }));
    list.querySelectorAll('.dc-rm-team').forEach((el, i) => el.addEventListener('click', () => {
        dcTeams.splice(i, 1);
        dcRenderTeams();
        dcRefreshUserTeamSelect();
        dcRenderPreview();
    }));
}

function dcRefreshUserTeamSelect() {
    // update all group selects to reflect current teams
    document.querySelectorAll('.dc-ug-team').forEach((sel, i) => {
        const cur = dcUserGroups[i]?.teamId;
        sel.innerHTML = dcTeams.map(t =>
            `<option value="${t.id}">${escAttr(t.name)} (ID ${t.id})</option>`
        ).join('');
        if (cur) sel.value = cur;
    });
}

// ─── User Groups ─────────────────────────────────────────────────────────────
function dcRenderUserGroups() {
    const list = document.getElementById('dc-users-list');
    const teamOpts = dcTeams.map(t =>
        `<option value="${t.id}">${escAttr(t.name)} (ID ${t.id})</option>`
    ).join('');

    list.innerHTML = dcUserGroups.map((g, i) => `
    <div class="cfg-card">
        <div class="cfg-card-row" style="align-items:flex-start;gap:10px">
            <div class="field" style="flex:1;margin-bottom:0">
                <label>Usernames <span style="opacity:.5;font-weight:400;text-transform:none">(one per line)</span></label>
                <textarea class="dc-ug-text" rows="4" placeholder="alice&#10;bob">${escAttr(g.text)}</textarea>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;flex:0 0 140px">
                <div class="field" style="margin-bottom:0">
                    <label>Assign Team</label>
                    <select class="dc-ug-team" style="width:100%">${teamOpts}</select>
                </div>
                ${dcUserGroups.length > 1 ? `
                <button class="btn btn-danger dc-ug-rm" style="width:100%;border-radius:8px;height:30px">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    <span style="font-size:0.72rem">Remove</span>
                </button>` : ''}
            </div>
        </div>
    </div>`).join('');

    // wire events
    list.querySelectorAll('.dc-ug-text').forEach((el, i) => {
        el.value = dcUserGroups[i].text;  // restore real value (escAttr was for HTML attr only)
        el.addEventListener('input', () => { dcUserGroups[i].text = el.value; dcRenderPreview(); });
    });
    list.querySelectorAll('.dc-ug-team').forEach((el, i) => {
        el.value = dcUserGroups[i].teamId;
        el.addEventListener('change', () => { dcUserGroups[i].teamId = parseInt(el.value); dcRenderPreview(); });
    });
    list.querySelectorAll('.dc-ug-rm').forEach((el, i) => {
        el.addEventListener('click', () => {
            dcUserGroups.splice(i, 1);
            dcRenderUserGroups();
            dcRenderPreview();
        });
    });
}

// ─── Events ───────────────────────────────────────────────────────────────────
document.getElementById('dc-add-team').addEventListener('click', () => {
    const nextId = dcTeams.length ? Math.max(...dcTeams.map(t => t.id)) + 1 : 1;
    dcTeams.push({ name: 'New Team', id: nextId });
    dcRenderTeams();
    dcRefreshUserTeamSelect();
    dcRenderPreview();
});

document.getElementById('dc-add-user-group').addEventListener('click', () => {
    const defaultTeam = dcTeams[0]?.id ?? 1;
    dcUserGroups.push({ text: '', teamId: defaultTeam });
    dcRenderUserGroups();
    dcRenderPreview();
});

document.getElementById('dc-directory').addEventListener('input', dcRenderPreview);

document.getElementById('dc-download').addEventListener('click', () => {
    download('disk_checker_config.json', JSON.stringify(dcBuild(), null, 2));
    toast('Downloaded disk_checker_config.json');
});

// ─── Init ─────────────────────────────────────────────────────────────────────
dcRenderTeams();
dcRefreshUserTeamSelect();
dcRenderUserGroups();
dcRenderPreview();
</script>
</body>
</html>
